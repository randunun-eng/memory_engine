# P1 #4 eval baseline — frozen seed corpus of neurons.
#
# 30 neurons across 6 topic clusters (5 per cluster). Deliberately
# diverse so a BM25-only retriever and a vector-only retriever will
# each succeed on different query patterns, letting RRF fusion show
# its value.
#
# Each neuron is materialised by the eval harness via a minimal
# append_event + manual INSERT into neurons + neurons_vec. Corpus is
# frozen here; changes require a new fixture version (filename bump).
#
# counterparty_id: 1 for contact-X scoped facts; NULL treated as domain.
# kind is derived from presence of counterparty_id.

