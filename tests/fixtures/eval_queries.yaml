# --- Adversarial queries: should return NO relevant neurons ---
# These measure precision-against-noise. A good retrieval system returns
# zero relevant hits in the top-K for these (our corpus has no coverage).
# If any of these surface fixture neurons, retrieval is over-reaching.
- id: q_adv_01
  query: "quantum computing algorithms"
  lens: "auto"
  expected_cluster: null
  adversarial: true
- id: q_adv_02
