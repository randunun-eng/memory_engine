# P1 #4 eval baseline — frozen query set.
#
# 20 queries across the 6 neuron clusters. Each query has an expected
# cluster (the ground-truth topic) and a lens directive. Exact relevance
# labels per (query, neuron) pair are generated by the LLM labeler
# (build_eval_relevance.py) and stored in eval_relevance.yaml.
#
# Phrasing is deliberately varied — some English, some Singlish, some
# typos — to exercise the cross-lingual and fuzzy matching behaviours.

