# 50 hand-labeled grounding truth fixtures for Phase 2 accuracy measurement.
#
# Each entry has:
#   event_text: the raw message text (the source event)
#   candidate: the extracted claim to evaluate
#   grounded: true/false — whether the grounding gate should accept this candidate
#   reason: human explanation of why it's grounded or ungrounded
#
# Labels are conservative: "grounded" means a reasonable reader would conclude
# the claim from the event text. "ungrounded" means the claim introduces
# information not present, paraphrases in a meaning-changing way, or fabricates
# specifics the source doesn't state.
#
# Fixture set covers:
#   - 30 grounded (60%): straightforward extractions, paraphrases, implied facts
#   - 20 ungrounded (40%): hallucinations, specificity inflation, temporal fabrication,
#     opinion-as-fact, cross-source conflation
#
# Created: 2026-04-16
# Author: hand-labeled for Phase 2 grounding gate evaluation

---

