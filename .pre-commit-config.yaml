# Pre-commit hooks for memory_engine.
#
# Install once:
#     uv run pre-commit install
#
# Run manually:
#     uv run pre-commit run --all-files

repos:
  # Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Type check (slow; runs only on push, not on commit)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        stages: [push]
        types: [python]

  # Governance: no direct LLM imports outside the policy plane
  - repo: local
    hooks:
      - id: no-direct-llm-imports
        name: "governance: no direct LLM SDK imports outside policy/"
        entry: bash -c '! grep -rn --include="*.py" -e "from openai" -e "from anthropic" -e "from litellm" src/memory_engine | grep -v "src/memory_engine/policy/"'
        language: system
        pass_filenames: false
        stages: [commit]
